# Save this file at: .github/workflows/update-stats.yml
# in your imAkashAd profile repository

name: Update GitHub Stats SVGs

on:
  schedule:
    - cron: "0 */8 * * *"   # runs every 8 hours
  workflow_dispatch:          # lets you trigger it manually too

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── GitHub Stats card ──────────────────────────────────────────
      - name: Generate GitHub Stats SVG
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: imAkashAd
          output_file: github-stats.svg
          args: >
            --theme=tokyonight
            --hide_border=true
            --bg_color=0D1117
            --title_color=00FFFF
            --icon_color=00FFFF
            --text_color=FFFFFF
            --count_private=true
            --include_all_commits=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Top Languages card ─────────────────────────────────────────
      - name: Generate Top Languages SVG
        uses: anuraghazra/github-readme-stats@latest
        with:
          username: imAkashAd
          output_file: github-langs.svg
          type: top-langs
          args: >
            --layout=compact
            --theme=tokyonight
            --hide_border=true
            --bg_color=0D1117
            --title_color=00FFFF
            --text_color=FFFFFF
            --langs_count=8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Streak Stats card ──────────────────────────────────────────
      - name: Generate Streak SVG
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          user: imAkashAd
          output_file: github-streak.svg
          theme: tokyonight-duo
          hide_border: true
          background: 0D1117
          stroke: 00FFFF
          ring: 00FFFF
          fire: FF6B35
          curr_streak_num: FFFFFF
          side_nums: 58A6FF
          curr_streak_label: 00FFFF
          side_labels: 58A6FF
          dates: 888888
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Commit all generated SVGs back to the repo ─────────────────
      - name: Commit SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg github-langs.svg github-streak.svg
          git diff --cached --quiet || git commit -m "chore: update stats SVGs [skip ci]"
          git push
