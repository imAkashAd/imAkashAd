name: Update GitHub Stats SVGs

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate GitHub Stats SVG
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const https = require('https');

            function fetchSVG(url) {
              return new Promise((resolve, reject) => {
                https.get(url, (res) => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => resolve(data));
                }).on('error', reject);
              });
            }

            const username = 'imAkashAd';
            const base = 'bg_color=0D1117&title_color=00FFFF&icon_color=00FFFF&text_color=FFFFFF&hide_border=true';

            const statsUrl = `https://github-readme-stats.vercel.app/api?username=${username}&show_icons=true&theme=tokyonight&${base}&count_private=true&include_all_commits=true`;
            const langsUrl = `https://github-readme-stats.vercel.app/api/top-langs/?username=${username}&layout=compact&theme=tokyonight&${base}&langs_count=8`;
            const streakUrl = `https://streak-stats.demolab.com?user=${username}&theme=tokyonight-duo&hide_border=true&background=0D1117&stroke=00FFFF&ring=00FFFF&fire=FF6B35&currStreakNum=FFFFFF&sideNums=58A6FF&currStreakLabel=00FFFF&sideLabels=58A6FF&dates=888888`;

            console.log('Fetching stats SVG...');
            const stats = await fetchSVG(statsUrl);
            fs.writeFileSync('github-stats.svg', stats);

            console.log('Fetching languages SVG...');
            const langs = await fetchSVG(langsUrl);
            fs.writeFileSync('github-langs.svg', langs);

            console.log('Fetching streak SVG...');
            const streak = await fetchSVG(streakUrl);
            fs.writeFileSync('github-streak.svg', streak);

            console.log('All SVGs generated successfully!');

      - name: Commit SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg github-langs.svg github-streak.svg
          git diff --cached --quiet || git commit -m "chore: update stats SVGs [skip ci]"
          git push
